<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>🖥️ Mission Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at top right, #1a2332, #0d1117); color: #e6edf3; font-family: 'Inter', sans-serif; min-height: 100vh; }
        .mega-tile { background: linear-gradient(145deg, rgba(22, 27, 34, 0.9), rgba(13, 17, 23, 0.95)); backdrop-filter: blur(20px); border: 1px solid rgba(48, 54, 61, 0.6); border-top: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); padding: 25px; margin-bottom: 25px; }
        .stat-value { font-family: 'JetBrains Mono', monospace; font-weight: 700; }
        .label { color: #8b949e; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; font-weight: 700; }
    </style>
</head>
<body class="p-6 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- HEADER -->
        <header class="mb-8 flex justify-between items-center">
            <h1 class="text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-purple-500">MISSION CONTROL</h1>
            <div class="text-green-400 text-xs font-mono bg-green-900/20 px-3 py-1 rounded-full border border-green-500/30">● LIVE</div>
        </header>

        <!-- GRID 1 -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-6">
            <div class="mega-tile">
                <div class="label text-blue-400 mb-4">Crypto Markets</div>
                <div class="space-y-2 text-lg"><div class="flex justify-between"><span>BTC</span><span class="stat-value text-green-400">$66,932</span></div><div class="flex justify-between"><span>ETH</span><span class="stat-value text-yellow-400">$2,057</span></div><div class="flex justify-between"><span>GNK</span><span class="stat-value text-green-400">$0.583 [BUY]</span></div></div>
            </div>
            <div class="mega-tile">
                <div class="label text-pink-400 mb-4">Sentiment</div>
                <div class="text-3xl font-bold text-red-500">9 (EXTREME FEAR)</div>
            </div>
            <div class="mega-tile">
                <div class="label text-purple-400 mb-4">DeFi Health</div>
                <div class="space-y-2"><div class="flex justify-between"><span>Aave</span><span class="stat-value text-green-400">2.05</span></div><div class="flex justify-between"><span>Jupiter</span><span class="stat-value text-green-400">2.10</span></div></div>
            </div>
        </div>

        <!-- AGENT ROSTER (FIXED) -->
        <div class="mega-tile w-full">
            <div class="flex justify-between items-center mb-4"><div class="label text-indigo-400">Agent Roster</div><div class="text-2xl">🐙</div></div>
            <table class="w-full text-sm text-left text-gray-300">
                <thead class="text-xs text-gray-500 uppercase bg-black/20">
                    <tr><th class="px-3 py-2">Agent</th><th class="px-3 py-2">Role</th><th class="px-3 py-2">Status</th></tr>
                </thead>
                <tbody>
                    <tr class="border-b border-gray-800"><td class="px-3 py-2">🐙 Martin</td><td class="px-3 py-2">Orchestrator</td><td class="px-3 py-2 text-green-400">● Active</td></tr>
                    <tr class="border-b border-gray-800"><td class="px-3 py-2">💰 Buffat</td><td class="px-3 py-2">Crypto/DeFi</td><td class="px-3 py-2 text-green-400">● Active</td></tr>
                    <tr class="border-b border-gray-800"><td class="px-3 py-2">🤖 Chip</td><td class="px-3 py-2">Developer</td><td class="px-3 py-2 text-green-400">● Active</td></tr>
                    <tr class="border-b border-gray-800"><td class="px-3 py-2">🤿 Kusto</td><td class="px-3 py-2">Video Analyst</td><td class="px-3 py-2 text-yellow-400">● Idle</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
